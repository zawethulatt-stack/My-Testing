<!doctype html>
<html lang="my">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f8f9fa;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .success-card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
      }

      .check-icon {
        font-size: 80px;
        color: #28a745;
        margin-bottom: 20px;
        animation: scaleUp 0.5s ease-in-out;
      }

      @keyframes scaleUp {
        from {
          transform: scale(0);
        }

        to {
          transform: scale(1);
        }
      }

      .btn-home {
        background: #ff4500;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        text-decoration: none;
        transition: 0.3s;
      }

      .btn-home:hover {
        background: #e63e00;
        color: white;
        transform: translateY(-3px);
      }
      .order-name {
        margin: 16px auto 24px;
        background: #f1f5f9;
        padding: 18px 20px;
        border-radius: 16px;
        text-align: left;
        color: #0f172a;
        max-width: 420px;
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      }
      .order-name strong {
        display: block;
        margin-top: 4px;
        font-size: 1.05rem;
        color: #111827;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="success-card">
      <div class="check-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h2 class="fw-bold mb-3">မှာယူမှု အောင်မြင်ပါသည်</h2>
      <p class="text-muted mb-4">
        လူကြီးမင်း၏ အမှာစာကို လက်ခံရရှိပါပြီ။ <br />
        အသေးစိတ် အချက်အလက်များကို လူကြီးမင်းထံ မကြာမီ ဆက်သွယ်ပေးပါမည်။
      </p>
      <div class="order-name hidden" id="order-name-box">
        <small class="text-muted">Order Name</small>
        <strong id="order-name"></strong>
      </div>
      <div class="order-id bg-light p-3 rounded mb-4">
        <small class="text-muted d-block">Order Number</small>
        <strong class="h5 text-dark"></strong>
      </div>
      <a href="./shop.html" class="btn-home d-inline-block"
        >ဈေးဝယ်ခြင်းကို ဆက်လုပ်ရန်</a
      >
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const params = new URLSearchParams(window.location.search);
        const orderName =
          params.get("name") || localStorage.getItem("orderName");
        if (orderName) {
          const box = document.getElementById("order-name-box");
          const nameEl = document.getElementById("order-name");
          nameEl.textContent = orderName;
          box.classList.remove("hidden");
          localStorage.removeItem("orderName");
        }
      });
    </script>
  </body>
</html>
